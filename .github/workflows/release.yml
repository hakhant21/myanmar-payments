name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        name: Create GitHub Release & Bump Version
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: main
                  fetch-depth: 0

            - name: Extract version from tag
              id: tag_version
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  VERSION="${TAG#v}"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

                  # Calculate next patch version (bump 0.0.1)
                  IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
                  NEXT_PATCH=$((PATCH + 1))
                  NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
                  echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag_version.outputs.tag }}
                  generate_release_notes: true

            - name: Bump version for next development cycle
              run: |
                  NEXT_VERSION="${{ steps.tag_version.outputs.next_version }}"
                  CURRENT=$(cat VERSION | tr -d '[:space:]')

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  if [ "$CURRENT" = "$NEXT_VERSION" ]; then
                      echo "VERSION is already ${NEXT_VERSION} — skipping bump commit."
                      exit 0
                  fi

                  echo "${NEXT_VERSION}" > VERSION
                  git add VERSION
                  git commit -m "chore: bump version to ${NEXT_VERSION} for next release"
                  git push origin HEAD:main
