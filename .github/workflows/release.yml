name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        name: Create GitHub Release & Bump Version
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: main
                  fetch-depth: 0

            - name: Extract version from tag
              id: tag_version
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  VERSION="${TAG#v}"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ steps.tag_version.outputs.tag }}
                  generate_release_notes: true

            - name: Keep VERSION aligned with release tag
              run: |
                  RELEASE_VERSION="${{ steps.tag_version.outputs.version }}"
                  CURRENT=$(cat VERSION | tr -d '[:space:]')

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  if [ "$CURRENT" = "$RELEASE_VERSION" ]; then
                      echo "VERSION is already ${RELEASE_VERSION} — skipping sync commit."
                      exit 0
                  fi

                  echo "${RELEASE_VERSION}" > VERSION
                  git add VERSION
                  git commit -m "chore: sync version to ${RELEASE_VERSION}"
                  git push origin HEAD:main
